<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${notice.title}">공지사항 상세</title>
    <link rel="stylesheet" th:href="@{/css/notice.css}">
</head>
<body>
<div class="container">

    <div class="notice-detail">
        <div class="detail-header">
            <div>
                <span th:if="${notice.pinned}" class="badge badge-pinned">고정</span>
                <span th:if="${notice.secret}" class="badge badge-secret">비밀</span>
            </div>
            <h2 class="detail-title" th:text="${notice.title}"></h2>
            <div class="detail-meta">
                <span>✍ <span th:text="${notice.author}"></span></span>
                <span>🕐 <span th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                <span th:if="${notice.updatedAt != notice.createdAt}">
                    수정됨: <span th:text="${#temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                </span>
                <span>👁 <span th:text="${notice.viewCount}"></span></span>
            </div>
        </div>

        <table class="detail-info-table">
            <tr>
                <th>내용</th>
                <td class="detail-content-cell" th:text="${notice.content}"></td>
            </tr>
        </table>

        <div class="detail-footer">
            <a th:href="@{/notices}" class="btn btn-secondary">목록</a>
            <div class="detail-actions">
                <a th:href="@{/notices/{id}/edit(id=${notice.id})}" class="btn btn-primary">수정</a>
                <form th:action="@{/notices/{id}/delete(id=${notice.id})}" method="post"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-danger">삭제</button>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
