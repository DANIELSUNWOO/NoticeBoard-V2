<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공지사항 수정</title>
    <link rel="stylesheet" th:href="@{/css/notice.css}">
</head>
<body>
<div class="container">

    <div class="page-header">
        <h1>공지사항 수정</h1>
    </div>

    <form th:action="@{/notices/{id}/edit(id=${notice.id})}" th:object="${notice}" method="post" class="notice-form">

        <div class="form-group">
            <label>제목</label>
            <input type="text" th:field="*{title}">
        </div>

        <div class="form-group">
            <label>내용</label>
            <textarea th:field="*{content}" rows="12"></textarea>
        </div>

        <div class="form-options">
            <label class="checkbox-label">
                <input type="checkbox" th:field="*{pinned}"> 상단 고정
            </label>
            <label class="checkbox-label">
                <input type="checkbox" th:field="*{secret}"> 비밀글
            </label>
        </div>

        <div class="form-buttons">
            <a th:href="@{/notices/{id}(id=${notice.id})}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">저장</button>
        </div>

    </form>

</div>
</body>
</html>
