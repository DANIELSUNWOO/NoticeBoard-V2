<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/notice.css}">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>로그인</h1>
    </div>

    <form th:action="@{/member/login}" method="post" class="notice-form">
        <div th:if="${errorMessage}" class="alert alert-danger"
             th:text="${errorMessage}"></div>

        <div class="form-group">
            <label>아이디</label>
            <input type="text" name="username" placeholder="아이디를 입력하세요">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요">
        </div>
        <div class="form-buttons">
            <a th:href="@{/member/register}" class="btn btn-secondary">회원가입</a>
            <button type="submit" class="btn btn-primary">로그인</button>
        </div>
    </form>
</div>
</body>
</html>
